name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Full history scan every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Full history for complete scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4d443b8f9a84cf05cd98ee1fae851  # v2.3.7
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@b4b15a43aa48dbd7d29a9c14bdb8e72f66a3b06ed  # v4.4.3
        with:
          name: gitleaks-report
          path: results.sarif
