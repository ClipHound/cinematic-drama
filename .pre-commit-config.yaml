# Pre-commit hooks for Cinematic Drama Interactive System
#
# Install:  pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# These hooks run automatically before every commit.
# They block commits that contain secrets, large files, or syntax errors.

repos:
  # Secret detection — blocks commits containing API keys, tokens, credentials
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ['--verbose']

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5000']
        name: Block files > 5MB
      - id: check-merge-conflict
        name: Block unresolved merge conflicts
      - id: check-case-conflict
        name: Check for case-insensitive filename conflicts
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with a newline
      - id: mixed-line-ending
        name: Normalize line endings
        args: ['--fix=lf']
      - id: detect-private-key
        name: Detect private keys

  # Python formatting (if ruff is installed)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ['--fix', '--select=E,F,I']
        name: Python linting (ruff)
        files: \.py$
      - id: ruff-format
        name: Python formatting (ruff)
        files: \.py$
